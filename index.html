<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Taichi Posts</title>

  <!-- Preconnect to Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <!-- Non-blocking font load -->
  <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Syne:wght@500;700;800&family=JetBrains+Mono:ital,wght@0,300;0,400;0,500;1,300&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" onload="this.rel='stylesheet'">
  <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Syne:wght@500;700;800&family=JetBrains+Mono:ital,wght@0,300;0,400;0,500;1,300&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap"></noscript>

  <!-- Loader styles (must render before JS modules load) -->
  <style>
    :root {
      --bg: #080d1a;
      --cyan: #00d4ff;
      --cyan-dim: rgba(0,212,255,.55);
      --purple: #a78bfa;
      --ff-brand: 'Orbitron', sans-serif;
      --ff-mono: 'JetBrains Mono', monospace;
    }
    #loader {
      position: fixed; inset: 0; z-index: 9999;
      background: var(--bg);
      display: flex; flex-direction: column; justify-content: center; align-items: center;
      transition: opacity .5s ease, visibility .5s ease;
    }
    #loader.hidden { opacity: 0; visibility: hidden; pointer-events: none; }
    .ldr-grid { position: absolute; inset: 0; opacity: .15; }
    #ldr-canvas { width: 100%; height: 100%; display: block; }
    .ldr-scan {
      position: absolute; top: 0; left: 0; width: 100%; height: 2px;
      background: var(--cyan);
      box-shadow: 0 0 20px 4px var(--cyan);
      animation: scan 2s ease-in-out infinite;
    }
    @keyframes scan { 0%,100%{top:0} 50%{top:100%} }
    .ldr-body { position: relative; text-align: center; }
    .ldr-title {
      font-family: var(--ff-brand); font-weight: 900; font-size: 1.6rem;
      letter-spacing: .18em; color: #fff;
    }
    .ldr-sub {
      font-family: var(--ff-mono); font-size: .6rem;
      color: var(--cyan-dim); margin-top: .3rem; letter-spacing: .1em;
    }
    .ldr-bar-wrap {
      margin-top: 1.2rem; width: 180px; height: 2px;
      background: rgba(255,255,255,.06); border-radius: 2px; overflow: hidden;
      display: inline-block;
    }
    .ldr-bar-fill {
      height: 100%; width: 35%;
      background: linear-gradient(90deg,var(--cyan),var(--purple));
      animation: pulse 1.2s ease-in-out infinite alternate;
    }
    @keyframes pulse { 0%{width:25%} 100%{width:85%} }
  </style>
</head>
<body>

<!-- Page Loader (renders immediately, before Vue/Vite JS loads) -->
<div id="loader">
  <div class="ldr-grid"><canvas id="ldr-canvas"></canvas></div>
  <div class="ldr-scan"></div>
  <div class="ldr-body">
    <div class="ldr-title">TAICHI POSTS</div>
    <div class="ldr-sub">MLS-MPM · SIGGRAPH 2018</div>
    <div class="ldr-bar-wrap"><div class="ldr-bar-fill"></div></div>
  </div>
</div>

<!-- Loader particle animation (inline, runs before module JS) -->
<script>
(function() {
  var canvas = document.getElementById("ldr-canvas");
  if (!canvas) return;
  var ctx = canvas.getContext("2d");
  var W, H, pts, animId;

  function resize() {
    W = canvas.width  = canvas.offsetWidth;
    H = canvas.height = canvas.offsetHeight;
    pts = [];
    var cols = Math.ceil(W / 38), rows = Math.ceil(H / 38);
    for (var r = 0; r <= rows; r++)
      for (var c = 0; c <= cols; c++)
        pts.push({ x: c * 38, y: r * 38, ox: c * 38, oy: r * 38,
                   vx: (Math.random()-.5)*.4, vy: (Math.random()-.5)*.4 });
  }

  function draw() {
    ctx.clearRect(0, 0, W, H);
    ctx.strokeStyle = "rgba(0,212,255,1)";
    ctx.lineWidth = .5;
    pts.forEach(function(p) {
      p.x += p.vx; p.y += p.vy;
      if (Math.abs(p.x - p.ox) > 8) p.vx *= -1;
      if (Math.abs(p.y - p.oy) > 8) p.vy *= -1;
    });
    for (var i = 0; i < pts.length; i++) {
      for (var j = i + 1; j < pts.length; j++) {
        var dx = pts[i].x - pts[j].x, dy = pts[i].y - pts[j].y;
        var d = Math.sqrt(dx*dx + dy*dy);
        if (d < 50) {
          ctx.globalAlpha = (1 - d/50) * .5;
          ctx.beginPath(); ctx.moveTo(pts[i].x, pts[i].y); ctx.lineTo(pts[j].x, pts[j].y); ctx.stroke();
        }
      }
    }
    ctx.globalAlpha = .7;
    ctx.fillStyle = "rgba(0,212,255,1)";
    pts.forEach(function(p) { ctx.beginPath(); ctx.arc(p.x, p.y, 1.2, 0, Math.PI*2); ctx.fill(); });
    ctx.globalAlpha = 1;
    animId = requestAnimationFrame(draw);
  }

  resize();
  window.addEventListener("resize", resize);
  draw();

  var obs = new MutationObserver(function() {
    if (document.getElementById("loader").classList.contains("hidden")) {
      cancelAnimationFrame(animId);
      obs.disconnect();
    }
  });
  obs.observe(document.getElementById("loader"), { attributes: true });
})();
</script>

<div id="app"></div>
<script type="module" src="/src/main.js"></script>

</body>
</html>
